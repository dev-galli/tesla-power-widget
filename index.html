<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tesla Energy Card Demo</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #0F0F0F;
      color: #eaeaea;
      font-family: "Inter", sans-serif;
    }

    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 12px;
    }

    .bar {
      display: flex;
      gap: 8px;
      padding: 8px 0;
    }

    .bar button {
      border: 1px solid #303030;
      background: #161616;
      color: #eee;
      border-radius: 8px;
      font: inherit;
      font-size: 12px;
      padding: 6px 10px;
      cursor: pointer;
    }

    tesla-energy-flow-card {
      display: block;
      width: 100%;
      min-height: 560px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="bar">
      <button id="btn-no-car">Toggle Car</button>
    </div>
    <tesla-energy-flow-card id="card"></tesla-energy-flow-card>
  </div>

  <script src="./tesla-energy-flow-card.js"></script>
  <script>
    const card = document.getElementById("card");

    const baseConfig = {
      title: "Tesla Energy",
      image_url: "./home.png",
      entities: {}
    };

    let carEnabled = true;

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function pushData() {
      const t = Date.now() / 1000;
      const solar = clamp(4.2 + Math.sin(t / 14) * 2.2, 0, 8.8);
      const home = clamp(2.4 + Math.cos(t / 8) * 0.8, 0.8, 5.8);
      const carPower = carEnabled && (Math.sin(t / 32) + 1) / 2 > 0.7 ? clamp(3.2 + Math.sin(t / 5) * 0.5, 2.2, 4.6) : null;
      const batteryPower = clamp((solar - home - (carPower || 0)) * 0.6, -4.2, 4.2);
      const grid = (solar - home - (carPower || 0) - batteryPower) * -1;

      card.setDemoData({
        solar,
        home,
        grid,
        batteryPower,
        batterySoc: 58,
        carPower,
        carSoc: carPower ? 46 : null,
      });
    }

    function init() {
      if (typeof card.setConfig !== "function") return;
      card.setConfig(baseConfig);
      pushData();
      setInterval(pushData, 1200);
    }

    document.getElementById("btn-no-car").addEventListener("click", () => {
      carEnabled = !carEnabled;
    });

    if (customElements.get("tesla-energy-flow-card")) init();
    else customElements.whenDefined("tesla-energy-flow-card").then(init);
  </script>
</body>
</html>
