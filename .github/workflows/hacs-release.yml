name: HACS Auto Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version and tag
        id: version
        shell: bash
        run: |
          set -euo pipefail

          BASE_VERSION=$(grep -Eo 'static version = "[0-9]+\.[0-9]+\.[0-9]+"' tesla-energy-flow-card.js | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -n1)
          if [ -z "${BASE_VERSION}" ]; then
            echo "Unable to extract base version from tesla-energy-flow-card.js" >&2
            exit 1
          fi

          MAJOR_MINOR=$(echo "$BASE_VERSION" | awk -F. '{print $1"."$2}')
          PATCH="${GITHUB_RUN_NUMBER}"
          if [ "${GITHUB_RUN_ATTEMPT}" -gt 1 ]; then
            PATCH="${GITHUB_RUN_NUMBER}${GITHUB_RUN_ATTEMPT}"
          fi
          TAG="v${MAJOR_MINOR}.${PATCH}"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=Release $TAG" >> "$GITHUB_OUTPUT"

      - name: Create Git tag
        shell: bash
        run: |
          set -euo pipefail
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          generate_release_notes: true
