name: HACS Auto Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version and tag
        id: version
        shell: bash
        run: |
          set -euo pipefail

          BASE_VERSION=$(grep -Eo 'static version = "[0-9]+\.[0-9]+\.[0-9]+"' tesla-energy-flow-card.js | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -n1)
          if [ -z "${BASE_VERSION}" ]; then
            echo "Unable to extract base version from tesla-energy-flow-card.js" >&2
            exit 1
          fi

          TAG="v${BASE_VERSION}"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=Release $TAG" >> "$GITHUB_OUTPUT"

      - name: Create Git tag
        id: create_tag
        shell: bash
        run: |
          set -euo pipefail
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag already exists: ${{ steps.version.outputs.tag }}. Skipping release."
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.create_tag.outputs.created == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          generate_release_notes: true
